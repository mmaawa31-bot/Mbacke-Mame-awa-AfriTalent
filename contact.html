 <!-- Contenu de la page -->
  <main class="container my-5">
    <section>
      <h1>Contactez-nous</h1>
      <p>Une question, un projet ? Écrivez-nous et on vous répond rapidement.</p>     
      <img src="Images/contact.jpeg" alt="Contact AfriTalent" class="img-fluid rounded mt-4">
           <p class="mt-4">Email : contact@afritalent.com<br>Téléphone : +221 77 123 45 67</p>
    </section>
    <!-- Formulaire de contact Commit 8 -->
<form id="contactForm" class="mt-4">
  <div class="mb-3">
    <label for="name" class="form-label">Nom</label>
    <input type="text" class="form-control" id="name" name="name">
    <span class="error text-danger small"></span>
  </div>
  
  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email">
    <span class="error text-danger small"></span>
  </div>
  
  <div class="mb-3">
    <label for="message" class="form-label">Message</label>
    <textarea class="form-control" id="message" name="message" rows="4"></textarea>
    <span class="error text-danger small"></span>
  </div>
  
  <button type="submit" class="btn btn-primary">Envoyer</button>
</form>
  </main>
